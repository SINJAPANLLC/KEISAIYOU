    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KEI SAIYOU｜軽貨物特化の採用プラットフォーム" />
    <meta name="twitter:description" content="KEI SAIYOUは軽貨物・運送会社のドライバー採用に特化したプラットフォームです。初期費用・月額費用ゼロ。3,000円／応募のシンプルな料金プラン。" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="splash-screen" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#fff;transition:opacity 0.5s ease-out">
      <div class="splash-inner" style="text-align:center">
        <img src="/logo-keisaiyou.png" alt="KEI SAIYOU" class="splash-logo" />
        <div style="font-size:0.8rem;color:#999;margin-top:10px;font-family:'Open Sans',sans-serif">軽貨物特化 採用プラットフォーム</div>
      </div>
    </div>
    <style>
      .splash-inner {
        animation: splashFadeUp 0.7s ease-out forwards;
        opacity: 0;
        transform: translateY(16px);
      }
      .splash-logo {
        height: 48px;
        width: auto;
        margin: 0 auto;
        display: block;
      }
      @keyframes splashFadeUp {
        0% { opacity:0; transform:translateY(16px) }
        100% { opacity:1; transform:translateY(0) }
      }
    </style>
    <script>
      window.__dismissSplash=function(){var s=document.getElementById('splash-screen');if(s){s.style.opacity='0';setTimeout(function(){s.remove()},500)}};
      setTimeout(function(){window.__dismissSplash()},5000);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
