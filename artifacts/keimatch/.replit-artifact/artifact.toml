kind = "web"
previewPath = "/"
title = "KeiMatch"
version = "1.0.0"
id = "keimatch-app"

[[services]]
localPort = 3000
name = "keimatch"
paths = ["/"]

[services.development]
run = "PORT=3000 NODE_ENV=development npx tsx /home/runner/workspace/artifacts/keimatch/server/index.ts"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/keimatch && npm run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/keimatch && node dist/index.cjs"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"
