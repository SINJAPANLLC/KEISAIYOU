kind = "web"
previewPath = "/"
title = "KeiMatch"
version = "1.0.0"
id = "keimatch-app"

[[services]]
localPort = 3000
name = "keimatch"
paths = ["/"]

[services.development]
run = "cd artifacts/keimatch && PORT=3000 NODE_ENV=development /home/runner/.npm/_npx/fd45a72a545557e9/node_modules/.bin/tsx server/index.ts"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd artifacts/keimatch && npm run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "cd artifacts/keimatch && node dist/index.cjs"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"
